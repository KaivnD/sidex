<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideX Cloud IDE</title>
    <script>
      // VS Code globals — must be set before any module loads
      globalThis._VSCODE_FILE_ROOT = window.location.origin + '/src/';
      globalThis._VSCODE_NLS_LANGUAGE = localStorage.getItem('vscode.nls.locale') || 'en';
      globalThis._VSCODE_NLS_MESSAGES = [];

      // Web mode - no Tauri
      globalThis.__SIDEX_TAURI__ = false;
      globalThis._VSCODE_PACKAGE_JSON = { version: '1.110.0', name: 'sidex-cloud' };
      globalThis._VSCODE_PRODUCT_JSON = {
        nameShort: 'SideX Cloud',
        nameLong: 'SideX Cloud IDE',
        applicationName: 'sidex-cloud',
        dataFolderName: '.sidex-cloud',
        urlProtocol: 'sidex-cloud',
        version: '1.110.0',
        commit: '',
        date: new Date().toISOString(),
        quality: 'stable',
        reportIssueUrl: 'https://github.com/sidenai/sidex/issues/new',
        licenseName: 'MIT',
        licenseUrl: 'https://github.com/sidenai/sidex/blob/main/LICENSE',
      };

      // Cloud IDE: get workspaceId from URL or use default
      globalThis.__SIDEX_CLOUD_WORKSPACE__ = new URLSearchParams(window.location.search).get('workspace') || 'default';
    </script>
    <script src="/builtin-extensions.js"></script>
    <script type="module" src="/src/cloud-main.ts" defer></script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #111111;
        color: #c0c0c0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        font-size: 13px;
      }
    </style>
  </head>
  <body aria-label="">
  </body>
</html>
